<!-- index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三体运动模型</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="space"></canvas>

  <section class="panel">
    <h1>三体运动模型</h1>
    <p>这是一个简化的牛顿引力三体模拟。</p>

    <div class="controls">
      <label>
        时间步长 dt：<span class="value" id="dtValue">0.016</span>
        <input id="dt" type="range" min="0.002" max="0.05" step="0.001" value="0.016" />
      </label>

      <label>
        引力常数 G：<span class="value" id="gValue">1.00</span>
        <input id="gravity" type="range" min="0.1" max="5" step="0.1" value="1" />
      </label>

      <label>
        轨迹长度：<span class="value" id="trailValue">650</span>
        <input id="trail" type="range" min="80" max="1800" step="10" value="650" />
      </label>

      <button id="reset">重置系统</button>
    </div>
  </section>

  <script src="main.js"></script>
</body>
</html>
